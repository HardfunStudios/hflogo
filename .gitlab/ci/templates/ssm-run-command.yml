# Local CI/CD component: run a shell payload on a single EC2 via SSM Run Command.
#
# Authenticates via GitLab OIDC + AssumeRoleWithWebIdentity, locates the target
# instance by an EC2 tag filter, ships the payload as the body of an
# AWS-RunShellScript invocation, and waits for completion. The payload is read
# from a path produced by an upstream job (typically as an artifact); the caller
# is responsible for assembling any preprocessing (e.g., base64-encoding files
# the payload references via env vars).
#
# Required GitLab CI/CD variable (project-level, protected):
#   - the variable named in `assume_role_arn_var` must hold the IAM Role ARN
#     to assume on every run. The role's trust policy must accept the project's
#     OIDC subject for the relevant ref (e.g. tag v*).

spec:
  inputs:
    job_name:
      type: string
      default: "ssm-run-command"
      description: "Name of the resulting CI job."
    stage:
      type: string
      default: "deploy"
      description: "Pipeline stage."
    needs:
      type: array
      default: []
      description: "Jobs that must complete before this one (typically the job that produced the payload artifact)."
    when:
      type: string
      default: "manual"
      options:
        - "on_success"
        - "manual"
      description: "Run policy. `manual` is the default for prod deploys."
    image:
      type: string
      default: "alpine:3.20"
      description: "Runner image."
    tags:
      type: array
      default:
        - "docker-linux"
      description: "Runner tags."
    aws_region:
      type: string
      description: "AWS region for the EC2 lookup and SSM call."
    aws_account_id:
      type: string
      description: "Expected AWS account ID after assume-role; the job aborts on mismatch."
    assume_role_arn_var:
      type: string
      default: "AWS_ASSUME_ROLE_ARN_PRODUCTION"
      description: "Name of the GitLab CI/CD variable that holds the IAM Role ARN to assume."
    instance_filter_tag_key:
      type: string
      default: "Service"
      description: "EC2 tag key used to locate the target instance."
    instance_filter_tag_value:
      type: string
      description: "EC2 tag value used to locate the target instance."
    payload_path:
      type: string
      description: "Path (relative to the project) of the shell script to run on the host."
    timeout_seconds:
      type: number
      default: 900
      description: "SSM command execution timeout. The CI poll loop also stops at this duration."
    comment:
      type: string
      default: ""
      description: "Optional human-readable comment attached to the SSM command (visible in CloudTrail)."
    execute_on_fork:
      type: boolean
      default: false
      description: "Allow the job to run when the project is a fork."

---

"$[[ inputs.job_name ]]":
  stage: $[[ inputs.stage ]]
  needs: $[[ inputs.needs ]]
  image: $[[ inputs.image ]]
  tags: $[[ inputs.tags ]]
  when: $[[ inputs.when ]]
  interruptible: false
  id_tokens:
    GITLAB_OIDC_TOKEN:
      aud: sts.amazonaws.com
  variables:
    GIT_STRATEGY: fetch
  before_script:
    - |
      if [ "$[[ inputs.execute_on_fork ]]" = "false" ] && [ "${HDFN_LOCAL_MAIN_PROJECT_ID:-}" ] && [ "${CI_PROJECT_ID}" -ne "${HDFN_LOCAL_MAIN_PROJECT_ID}" ]; then
        echo "Executando em fork, abortando."
        exit 0
      fi
  script:
    - apk add --no-cache aws-cli jq bash ca-certificates coreutils >/dev/null
    - |
      set -euo pipefail

      AWS_REGION="$[[ inputs.aws_region ]]"
      AWS_ACCOUNT_ID="$[[ inputs.aws_account_id ]]"
      ASSUME_ROLE_ARN_VAR="$[[ inputs.assume_role_arn_var ]]"
      ASSUME_ROLE_ARN="$(eval echo "\$$ASSUME_ROLE_ARN_VAR")"
      TAG_KEY="$[[ inputs.instance_filter_tag_key ]]"
      TAG_VALUE="$[[ inputs.instance_filter_tag_value ]]"
      PAYLOAD="$[[ inputs.payload_path ]]"
      TIMEOUT=$[[ inputs.timeout_seconds ]]
      COMMENT_INPUT="$[[ inputs.comment ]]"

      [ -n "$ASSUME_ROLE_ARN" ] || { echo "ERR: variable $ASSUME_ROLE_ARN_VAR is empty"; exit 1; }
      [ -f "$PAYLOAD" ] || { echo "ERR: payload not found at $PAYLOAD"; exit 1; }

      echo ">> Assuming role $ASSUME_ROLE_ARN"
      CREDS=$(aws sts assume-role-with-web-identity \
        --role-arn "$ASSUME_ROLE_ARN" \
        --role-session-name "ssm-${CI_PIPELINE_ID}" \
        --web-identity-token "$GITLAB_OIDC_TOKEN" \
        --duration-seconds 3600)
      export AWS_ACCESS_KEY_ID=$(echo "$CREDS"  | jq -r .Credentials.AccessKeyId)
      export AWS_SECRET_ACCESS_KEY=$(echo "$CREDS" | jq -r .Credentials.SecretAccessKey)
      export AWS_SESSION_TOKEN=$(echo "$CREDS"   | jq -r .Credentials.SessionToken)
      export AWS_REGION
      export AWS_DEFAULT_REGION="$AWS_REGION"

      ACC=$(aws sts get-caller-identity --query Account --output text)
      [ "$ACC" = "$AWS_ACCOUNT_ID" ] || { echo "ERR: assumed role lives in account $ACC, expected $AWS_ACCOUNT_ID"; exit 1; }
      echo "✔ Caller: $(aws sts get-caller-identity --query Arn --output text)"

      INSTANCE_ID=$(aws ec2 describe-instances \
        --filters "Name=tag:${TAG_KEY},Values=${TAG_VALUE}" \
                  "Name=instance-state-name,Values=running" \
        --query 'Reservations[0].Instances[0].InstanceId' --output text)
      [ -n "$INSTANCE_ID" ] && [ "$INSTANCE_ID" != "None" ] \
        || { echo "ERR: no running instance with ${TAG_KEY}=${TAG_VALUE}"; exit 1; }
      echo "✔ Target instance: $INSTANCE_ID"

      jq -Rs '{commands: [.]}' "$PAYLOAD" > /tmp/ssm-params.json

      COMMENT="${COMMENT_INPUT:-ssm-run-${CI_COMMIT_TAG:-$CI_COMMIT_SHORT_SHA}}"

      echo ">> Sending SSM command (timeout=${TIMEOUT}s)"
      COMMAND_ID=$(aws ssm send-command \
        --instance-ids "$INSTANCE_ID" \
        --document-name AWS-RunShellScript \
        --comment "$COMMENT" \
        --timeout-seconds "$TIMEOUT" \
        --parameters file:///tmp/ssm-params.json \
        --query 'Command.CommandId' --output text)
      echo "✔ Command ID: $COMMAND_ID"

      START=$(date +%s)
      while true; do
        sleep 10
        if [ $(( $(date +%s) - START )) -gt "$TIMEOUT" ]; then
          echo "ERR: timed out after ${TIMEOUT}s; cancelling SSM command"
          aws ssm cancel-command --command-id "$COMMAND_ID" --instance-ids "$INSTANCE_ID" || true
          exit 1
        fi
        STATUS=$(aws ssm get-command-invocation \
          --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" \
          --query 'Status' --output text 2>/dev/null || echo "Pending")
        echo "  $(date -u +%H:%M:%S) status=$STATUS"
        case "$STATUS" in
          Success) break ;;
          Failed|Cancelled|TimedOut)
            echo "--- stderr ---"
            aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" \
              --query 'StandardErrorContent' --output text || true
            echo "--- stdout ---"
            aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" \
              --query 'StandardOutputContent' --output text || true
            exit 1
            ;;
        esac
      done

      echo "--- stdout ---"
      aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" \
        --query 'StandardOutputContent' --output text
      echo ""
      echo "✔ Command succeeded on $INSTANCE_ID"
