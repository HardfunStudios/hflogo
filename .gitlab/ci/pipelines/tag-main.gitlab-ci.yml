workflow:
  rules:
    - if: $CI_PROJECT_ID == $HDFN_LOCAL_MAIN_PROJECT_ID
      when: always
      variables:
        HDFN_LOCAL_DEFAULT_GIT_STRATEGY: "fetch"
    - if: $CI_PROJECT_ID != $HDFN_LOCAL_MAIN_PROJECT_ID
      when: always
      variables:
        HDFN_LOCAL_DEFAULT_GIT_STRATEGY: "clone"

include:
  - component: $CI_SERVER_FQDN/devops/jobs/ruby-rspec/run@1
    inputs:
      job_name: rspec
      stage: test
      image: "ruby:3.3.11-slim"
      pg_service_enabled: true
      pg_image: "postgres:16-alpine"
      pg_db: "hflogo_test"
      pg_user: "hflogo"
      pg_password: "hflogo"
      redis_service_enabled: true
      os_extra_packages_debian: "libpq-dev libyaml-dev libvips pkg-config"
      command: "bundle exec rspec"

  - component: $CI_SERVER_FQDN/devops/jobs/build-docker/run@1
    inputs:
      job_name: build-prod
      stage: build
      needs:
        - rspec
      dockerfile_name: "Dockerfile"
      docker_image_url: ${CI_REGISTRY_IMAGE}
      docker_image_tag: ${CI_COMMIT_TAG}
      update_latest: true

  - local: /.gitlab/ci/templates/ssm-run-command.yml
    inputs:
      job_name: deploy-prod
      stage: deploy
      needs:
        - prepare-deploy
      when: manual
      aws_region: "sa-east-1"
      aws_account_id: "097954291364"
      assume_role_arn_var: "AWS_ASSUME_ROLE_ARN_PRODUCTION"
      instance_filter_tag_key: "Service"
      instance_filter_tag_value: "hardfun-hflogo-prod-sae1"
      payload_path: "deploy-artifact/payload.sh"
      timeout_seconds: 900
      comment: "hflogo deploy ${CI_COMMIT_TAG}"

prepare-deploy:
  stage: build
  needs:
    - build-prod
  image: alpine:3.20
  tags:
    - docker-linux
  interruptible: false
  variables:
    GIT_STRATEGY: fetch
  before_script:
    - |
      if [ "${HDFN_LOCAL_MAIN_PROJECT_ID:-}" ] && [ "${CI_PROJECT_ID}" -ne "${HDFN_LOCAL_MAIN_PROJECT_ID}" ]; then
        echo "Executando em fork, abortando."
        exit 0
      fi
  script:
    - apk add --no-cache coreutils bash >/dev/null
    - mkdir -p deploy-artifact
    - |
      {
        echo "export IMAGE_URL=${CI_REGISTRY_IMAGE}"
        echo "export IMAGE_TAG=${CI_COMMIT_TAG}"
        echo "export COMPOSE_B64=$(base64 -w0 docker-compose.prod.yml)"
        echo "export CADDYFILE_B64=$(base64 -w0 Caddyfile)"
        cat bin/deploy-host.sh
      } > deploy-artifact/payload.sh
    - chmod 0644 deploy-artifact/payload.sh
    - wc -l deploy-artifact/payload.sh
  artifacts:
    paths:
      - deploy-artifact/payload.sh
    expire_in: 1 day
