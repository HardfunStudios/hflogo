workflow:
  rules:
    - if: $CI_PROJECT_ID == $HDFN_LOCAL_MAIN_PROJECT_ID
      when: always
      variables:
        HDFN_LOCAL_DEFAULT_GIT_STRATEGY: "fetch"
    - if: $CI_PROJECT_ID != $HDFN_LOCAL_MAIN_PROJECT_ID
      when: always
      variables:
        HDFN_LOCAL_DEFAULT_GIT_STRATEGY: "clone"

include:
  - component: $CI_SERVER_FQDN/devops/jobs/ruby-rspec/run@1
    inputs:
      job_name: rspec
      stage: test
      image: "ruby:3.3.11-slim"
      pg_service_enabled: true
      pg_image: "postgres:16-alpine"
      pg_db: "hflogo_test"
      pg_user: "hflogo"
      pg_password: "hflogo"
      redis_service_enabled: true
      os_extra_packages_debian: "libpq-dev libyaml-dev libvips pkg-config"
      command: "bundle exec rspec"

  - component: $CI_SERVER_FQDN/devops/jobs/build-docker/run@1
    inputs:
      job_name: build-prod
      stage: build
      needs:
        - rspec
      dockerfile_name: "Dockerfile"
      docker_image_url: ${CI_REGISTRY_IMAGE}
      docker_image_tag: ${CI_COMMIT_TAG}
      update_latest: true

deploy-prod:
  stage: deploy
  needs:
    - build-prod
  image: alpine:3.20
  tags:
    - docker-linux
  when: manual
  interruptible: false
  id_tokens:
    GITLAB_OIDC_TOKEN:
      aud: sts.amazonaws.com
  variables:
    GIT_STRATEGY: fetch
  before_script:
    - |
      if [ "${HDFN_LOCAL_MAIN_PROJECT_ID:-}" ] && [ "${CI_PROJECT_ID}" -ne "${HDFN_LOCAL_MAIN_PROJECT_ID}" ]; then
        echo "Executando em fork, abortando."
        exit 0
      fi
  script:
    - apk add --no-cache aws-cli jq bash ca-certificates coreutils >/dev/null
    - |
      set -euo pipefail

      echo ">> Assuming role $AWS_ASSUME_ROLE_ARN_PRODUCTION"
      CREDS=$(aws sts assume-role-with-web-identity \
        --role-arn "$AWS_ASSUME_ROLE_ARN_PRODUCTION" \
        --role-session-name "hflogo-deploy-${CI_PIPELINE_ID}" \
        --web-identity-token "$GITLAB_OIDC_TOKEN" \
        --duration-seconds 3600)
      export AWS_ACCESS_KEY_ID=$(echo "$CREDS"  | jq -r .Credentials.AccessKeyId)
      export AWS_SECRET_ACCESS_KEY=$(echo "$CREDS" | jq -r .Credentials.SecretAccessKey)
      export AWS_SESSION_TOKEN=$(echo "$CREDS"   | jq -r .Credentials.SessionToken)
      export AWS_REGION="$AWS_REGION_PRODUCTION"
      export AWS_DEFAULT_REGION="$AWS_REGION_PRODUCTION"

      ACC=$(aws sts get-caller-identity --query Account --output text)
      [ "$ACC" = "$AWS_ACCOUNT_ID_PRODUCTION" ] || { echo "ERR: assumed role lives in account $ACC, expected $AWS_ACCOUNT_ID_PRODUCTION"; exit 1; }
      echo "✔ Caller: $(aws sts get-caller-identity --query Arn --output text)"

      INSTANCE_ID=$(aws ec2 describe-instances \
        --filters "Name=tag:Service,Values=${HFLOGO_SERVICE_TAG}" \
                  "Name=instance-state-name,Values=running" \
        --query 'Reservations[0].Instances[0].InstanceId' --output text)
      [ -n "$INSTANCE_ID" ] && [ "$INSTANCE_ID" != "None" ] \
        || { echo "ERR: no running instance with Service=$HFLOGO_SERVICE_TAG"; exit 1; }
      echo "✔ Target instance: $INSTANCE_ID"

      IMAGE_URL="$CI_REGISTRY_IMAGE"
      IMAGE_TAG="$CI_COMMIT_TAG"
      COMPOSE_B64=$(base64 -w0 docker-compose.prod.yml)
      CADDYFILE_B64=$(base64 -w0 Caddyfile)

      # Build the SSM payload: env exports + deploy-host.sh body.
      {
        printf "export IMAGE_URL=%q\n"     "$IMAGE_URL"
        printf "export IMAGE_TAG=%q\n"     "$IMAGE_TAG"
        printf "export COMPOSE_B64=%q\n"   "$COMPOSE_B64"
        printf "export CADDYFILE_B64=%q\n" "$CADDYFILE_B64"
        cat bin/deploy-host.sh
      } > /tmp/payload.sh

      jq -Rs '{commands: [.]}' /tmp/payload.sh > /tmp/params.json

      echo ">> Sending SSM command"
      COMMAND_ID=$(aws ssm send-command \
        --instance-ids "$INSTANCE_ID" \
        --document-name AWS-RunShellScript \
        --comment "hflogo deploy ${IMAGE_TAG}" \
        --timeout-seconds 900 \
        --parameters file:///tmp/params.json \
        --query 'Command.CommandId' --output text)
      echo "✔ Command ID: $COMMAND_ID"

      echo ">> Polling status (up to 15 min)"
      START=$(date +%s)
      while true; do
        sleep 10
        NOW=$(date +%s)
        if [ $((NOW - START)) -gt 900 ]; then
          echo "ERR: timed out after 15 min waiting for SSM command"
          exit 1
        fi
        STATUS=$(aws ssm get-command-invocation \
          --command-id "$COMMAND_ID" \
          --instance-id "$INSTANCE_ID" \
          --query 'Status' --output text 2>/dev/null || echo "Pending")
        echo "  $(date -u +%H:%M:%S) status=$STATUS"
        case "$STATUS" in
          Success) break ;;
          Failed|Cancelled|TimedOut)
            echo "--- stderr ---"
            aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" \
              --query 'StandardErrorContent' --output text || true
            echo "--- stdout ---"
            aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" \
              --query 'StandardOutputContent' --output text || true
            exit 1
            ;;
        esac
      done

      echo "--- stdout ---"
      aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" \
        --query 'StandardOutputContent' --output text
      echo ""
      echo "✔ Deploy complete: $IMAGE_URL:$IMAGE_TAG on $INSTANCE_ID"
