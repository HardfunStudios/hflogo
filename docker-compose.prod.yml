name: hflogo

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: hflogo
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: hflogo_production
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hflogo -d hflogo_production"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    image: ${IMAGE_URL}:${IMAGE_TAG}
    restart: unless-stopped
    env_file:
      - runtime.env
    environment:
      RAILS_ENV: production
      RAILS_LOG_TO_STDOUT: "1"
      RAILS_SERVE_STATIC_FILES: "1"
      PORT: "80"
      HOST: ${DOMAIN_NAME}
      DATABASE_URL: postgres://hflogo:${DATABASE_PASSWORD}@db:5432/hflogo_production
      HFLOGO_DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      # libpq env vars: needed because the app's database.yml production block
      # specifies username/password/database explicitly but no host, which makes
      # Rails 8 multi-db ignore DATABASE_URL's host and fall back to socket.
      PGHOST: db
      PGPORT: "5432"
      PGUSER: hflogo
      PGPASSWORD: ${DATABASE_PASSWORD}
      REDIS_URL: redis://redis:6379/1
      AWS_REGION: ${AWS_REGION}
      AWS_S3_BUCKET: ${STORAGE_BUCKET_NAME}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:80/up || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 90s

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN_NAME: ${DOMAIN_NAME}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      app:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
