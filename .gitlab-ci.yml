stages:
  - validate
  - test
  - build
  - deploy

variables:
  GIT_STRATEGY: fetch
  GIT_SUBMODULE_STRATEGY: none
  GIT_DEPTH: 20
  GIT_FETCH_EXTRA_FLAGS: --no-tags
  ARTIFACT_DOWNLOAD_ATTEMPTS: 3
  EXECUTOR_JOB_SECTION_ATTEMPTS: 3
  GET_SOURCES_ATTEMPTS: 3
  RESTORE_CACHE_ATTEMPTS: 3

  HDFN_LOCAL_DEFAULT_GIT_STRATEGY: "fetch"
  HDFN_LOCAL_MAIN_PROJECT_ID: "85"

  AWS_ACCOUNT_ID_PRODUCTION: "097954291364"
  AWS_REGION_PRODUCTION: "sa-east-1"
  HFLOGO_SERVICE_TAG: "hardfun-hflogo-prod-sae1"

include:
  - local: /.gitlab/ci/pipelines/mr-to-main.gitlab-ci.yml
    rules:
      - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main"

  - local: /.gitlab/ci/pipelines/branch-main.gitlab-ci.yml
    rules:
      - if: $CI_PIPELINE_SOURCE =~ "/(push)|(web)/" && $CI_COMMIT_BRANCH == "main"

  - local: /.gitlab/ci/pipelines/tag-main.gitlab-ci.yml
    rules:
      - if: $CI_COMMIT_TAG
